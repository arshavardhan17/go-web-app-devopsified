<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Arsha Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      .contact-form {
        max-width: 600px;
        margin: 120px auto 100px;
        background: var(--card-bg);
        padding: 40px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
      }

      .form-group {
        margin-bottom: 25px;
      }

      .form-group label {
        display: block;
        margin-bottom: 10px;
        color: #a0a0a0;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 15px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        color: white;
        font-family: inherit;
      }

      .form-group input:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--accent-color);
      }

      .contact-info {
        text-align: center;
        margin-bottom: 50px;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="container nav">
        <a href="/home" class="logo">ARSHA STORE</a>
        <ul class="nav-links">
          <li><a href="/home">Home</a></li>
          <li><a href="/courses">Products</a></li>
          <li><a href="/about">About</a></li>
          <li><a href="/contact">Contact</a></li>
        </ul>
        <a
          href="/courses"
          class="btn"
          style="padding: 10px 20px; font-size: 0.9rem"
          >Shop Now</a
        >
      </div>
    </header>

    <main>
      <div class="container overflow-hidden">
        <div class="contact-form">
          <div class="contact-info">
            <h1>Get in Touch</h1>
            <p>We'd love to hear from you. Send us a message.</p>
          </div>
          <form>
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" placeholder="Your Name" />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="hello@example.com" />
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                rows="5"
                placeholder="How can we help?"
              ></textarea>
            </div>
            <button
              type="submit"
              class="btn"
              style="width: 100%; border: none; cursor: pointer"
            >
              Send Message
            </button>
          </form>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <div class="footer-links">
          <a href="/home">Home</a>
          <a href="/courses">Products</a>
          <a href="/about">About</a>
          <a href="/contact">Contact</a>
        </div>
        <p class="copyright">&copy; 2024 Arsha Store. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
